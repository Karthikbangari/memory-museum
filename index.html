<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pachala Function — A Fairyland Celebration</title>
<meta name="description" content="A royal fairyland celebration — family, blessings, and memories." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;background:#1a0f2e;}
  #root{min-height:100vh;}
  .boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#f5e6c8;font-family:'Cormorant Garamond',serif;letter-spacing:4px;text-transform:uppercase;font-size:15px;background:#1a0f2e;}
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.451.0?external=react&deps=react@18.3.1"
  }
}
</script>
</head>
<body>
<div id="root"><div class="boot">Entering the Fairyland…</div></div>

<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef, useCallback } from "react";
import { createRoot } from "react-dom/client";
import { Crown, Sparkles, Heart, X, ChevronLeft, ChevronRight, Star, Flower2, ArrowDown } from "lucide-react";

/* ============================================================
   PACHALA FUNCTION — Royal Fairyland / Heaven theme, full 3D
   Edit NAMES, captions and photo filenames freely below.
   Photos are served from GitHub via jsDelivr.
   ============================================================ */
const PHOTO_BASE = "https://cdn.jsdelivr.net/gh/Karthikbangari/memory-museum@main/photos";
const P = (f) => `${PHOTO_BASE}/${f}`;

/* ---- The celebration title / name tag (change to your name) ---- */
const HONOREE = "Pachala";
const HONOREE_SUB = "A Fairyland of Love & Blessings";

/* ---- Family introduced ONE BY ONE (single photo each) ---- */
const PEOPLE = [
  { name: "Amma",    telugu: "అమ్మ",     photo: P("wa-01.jpg"),   role: "Mother",      caption: "The first love, the softest lap — the warmth that turns a house into a home." },
  { name: "Nana",    telugu: "నాన్న",    photo: P("wa-02.jpg"),   role: "Father",      caption: "Quiet strength and steady hands — the roots that hold us all together." },
  { name: "Ammamma", telugu: "అమ్మమ్మ", photo: P("ammamma.jpg"), role: "Grandmother", caption: "Stories at night, sweets in steel boxes, and a love that time can never fade." },
  { name: "Mama",    telugu: "మామయ్య",   photo: P("wa-03.jpg"),   role: "Uncle",       caption: "Laughter, mischief, and the joy that lights up every gathering." },
];

/* ---- Group / together photos (the whole family) ---- */
const GROUP = [
  P("family.jpg"), P("wa-04.jpg"), P("wa-05.jpg"), P("wa-06.jpg"), P("wa-07.jpg"),
  P("wa-08.jpg"), P("wa-09.jpg"), P("wa-10.jpg"), P("wa-11.jpg"), P("wa-12.jpg"),
  P("wa-13.jpg"), P("photo-06.jpg"), P("photo-08.jpg"), P("photo-09.jpg"),
];

/* ---------- gold sparkle field ---------- */
function Sparkle({ i }) {
  const s = 2 + ((i * 7) % 5);
  const left = (i * 53) % 100;
  const top = (i * 37) % 100;
  const dur = 3 + ((i * 3) % 5);
  const delay = (i % 9) * 0.4;
  return (
    <span className="ff-sparkle" style={{
      left: `${left}%`, top: `${top}%`, width: s, height: s,
      animationDuration: `${dur}s`, animationDelay: `${delay}s`,
    }} />
  );
}

/* ---------- floating clouds ---------- */
function Clouds() {
  return (
    <div className="ff-clouds" aria-hidden>
      {Array.from({ length: 6 }).map((_, i) => (
        <span key={i} className="ff-cloud" style={{
          top: `${8 + i * 15}%`,
          "--s": `${0.6 + (i % 3) * 0.35}`,
          "--dur": `${38 + i * 9}s`,
          "--delay": `${-i * 7}s`,
          opacity: 0.10 + (i % 3) * 0.05,
        }} />
      ))}
    </div>
  );
}

/* ---------- scroll reveal ---------- */
function useReveal(threshold = 0.25) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const ob = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setShown(true); ob.disconnect(); } }, { threshold });
    ob.observe(el);
    return () => ob.disconnect();
  }, [threshold]);
  return [ref, shown];
}

/* ---------- 3D tilt wrapper ---------- */
function Tilt({ children, className, style, intensity = 12, onClick }) {
  const [t, setT] = useState({ x: 0, y: 0, s: 1 });
  const move = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    setT({ x: py * -intensity, y: px * intensity, s: 1.03 });
  };
  return (
    <div className={className} onClick={onClick} onMouseMove={move}
      onMouseLeave={() => setT({ x: 0, y: 0, s: 1 })}
      style={{ ...style, transform: `perspective(1100px) rotateX(${t.x}deg) rotateY(${t.y}deg) scale(${t.s})`, transition: "transform .25s ease" }}>
      {children}
    </div>
  );
}

/* ---------- INTRO ---------- */
function Intro({ onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2600); return () => clearTimeout(t); }, [onDone]);
  return (
    <div className="ff-intro">
      <div className="ff-intro-halo" />
      <Crown className="ff-intro-crown" size={46} />
      <h1 className="ff-intro-title">{HONOREE}</h1>
      <p className="ff-intro-sub">entering the fairyland…</p>
      <div className="ff-intro-line"><i /></div>
    </div>
  );
}

/* ---------- HERO (royal, name tag + hero pic, parallax 3D) ---------- */
function Hero({ onScroll }) {
  const [p, setP] = useState({ x: 0, y: 0 });
  const onMove = (e) => {
    const x = (e.clientX / window.innerWidth - 0.5);
    const y = (e.clientY / window.innerHeight - 0.5);
    setP({ x, y });
  };
  return (
    <header className="ff-hero" onMouseMove={onMove}>
      <div className="ff-hero-glow" style={{ transform: `translate(${p.x * -30}px, ${p.y * -30}px)` }} />
      <Clouds />
      <div className="ff-sparkles">{Array.from({ length: 40 }).map((_, i) => <Sparkle key={i} i={i} />)}</div>

      <div className="ff-hero-inner">
        <div className="ff-hero-frame-wrap" style={{ transform: `translate(${p.x * 24}px, ${p.y * 24}px)` }}>
          <div className="ff-hero-arch">
            <div className="ff-hero-arch-glow" />
            <img className="ff-hero-pic" src={P("hero.jpg")} alt={HONOREE}
              onError={(e) => { e.currentTarget.style.opacity = 0; }} />
            <div className="ff-hero-shine" />
          </div>
          <div className="ff-hero-crown"><Crown size={34} /></div>
        </div>

        <div className="ff-nameplate" style={{ transform: `translate(${p.x * 12}px, ${p.y * 12}px)` }}>
          <span className="ff-eyebrow"><Sparkles size={13} /> A Royal Fairyland Celebration <Sparkles size={13} /></span>
          <h1 className="ff-name">{HONOREE}</h1>
          <span className="ff-divider"><i /><Flower2 size={16} /><i /></span>
          <p className="ff-name-sub">{HONOREE_SUB}</p>
        </div>
      </div>

      <button className="ff-scroll" onClick={onScroll}>
        <span>Begin the Journey</span><ArrowDown size={16} />
      </button>
    </header>
  );
}

/* ---------- PERSON (one-by-one, alternating, 3D reveal) ---------- */
function Person({ person, index, onOpen }) {
  const [ref, shown] = useReveal(0.3);
  const left = index % 2 === 0;
  return (
    <section className={`ff-person ${left ? "l" : "r"} ${shown ? "in" : ""}`} ref={ref}>
      <div className="ff-person-sparkles">{Array.from({ length: 14 }).map((_, i) => <Sparkle key={i} i={i + index * 5} />)}</div>

      <Tilt className="ff-person-photo" intensity={14} onClick={() => onOpen(person.photo)}>
        <div className="ff-person-ring" />
        <div className="ff-person-img">
          <img src={person.photo} alt={person.name} loading="lazy"
            onError={(e) => { e.currentTarget.parentElement.classList.add("ph"); }} />
        </div>
        <div className="ff-person-crown"><Crown size={22} /></div>
      </Tilt>

      <div className="ff-person-text">
        <span className="ff-person-no">{String(index + 1).padStart(2, "0")}</span>
        <p className="ff-person-telugu">{person.telugu}</p>
        <h2 className="ff-person-name">{person.name}</h2>
        <span className="ff-person-role"><Heart size={12} /> {person.role}</span>
        <p className="ff-person-cap">{person.caption}</p>
        <span className="ff-divider sm"><i /><Star size={13} /><i /></span>
      </div>
    </section>
  );
}

/* ---------- GROUP GALLERY (3D tilt cards) ---------- */
function Gallery({ onOpen }) {
  const [ref, shown] = useReveal(0.12);
  return (
    <section className="ff-gallery" ref={ref}>
      <div className="ff-head">
        <span className="ff-kicker"><Sparkles size={14} /> All of Us</span>
        <h2 className="ff-head-title">Together, In One Frame</h2>
        <p className="ff-head-sub">The whole family — gathered, glowing, and gloriously together.</p>
      </div>
      <div className={`ff-grid ${shown ? "in" : ""}`}>
        {GROUP.map((src, i) => (
          <Tilt key={i} className={`ff-grid-item ${i === 0 ? "big" : ""}`} intensity={10}
            style={{ "--d": `${(i % 6) * 0.08}s` }} onClick={() => onOpen(src)}>
            <div className="ff-grid-img">
              <img src={src} alt={`Memory ${i + 1}`} loading="lazy"
                onError={(e) => { e.currentTarget.parentElement.classList.add("ph"); }} />
              <div className="ff-grid-shine" />
            </div>
          </Tilt>
        ))}
      </div>
    </section>
  );
}

/* ---------- ENDING ---------- */
function Ending({ onTop }) {
  const [ref, shown] = useReveal(0.3);
  return (
    <section className={`ff-ending ${shown ? "in" : ""}`} ref={ref}>
      <Clouds />
      <div className="ff-sparkles">{Array.from({ length: 30 }).map((_, i) => <Sparkle key={i} i={i + 11} />)}</div>
      <div className="ff-ending-inner">
        <Crown size={40} className="ff-ending-crown" />
        <p className="ff-ending-text">Blessings, love, and laughter —<br />memories that float like clouds,<br /><em>forever.</em></p>
        <button className="ff-btn" onClick={onTop}><Sparkles size={15} /> Back to the Beginning</button>
      </div>
    </section>
  );
}

/* ---------- LIGHTBOX ---------- */
function Lightbox({ src, onClose }) {
  useEffect(() => {
    const k = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", k);
    document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", k); document.body.style.overflow = ""; };
  }, [onClose]);
  return (
    <div className="ff-lb" onClick={onClose}>
      <button className="ff-lb-x" onClick={onClose}><X size={20} /></button>
      <div className="ff-lb-frame" onClick={(e) => e.stopPropagation()}>
        <img src={src} alt="memory" />
      </div>
    </div>
  );
}

/* ---------- APP ---------- */
function App() {
  const [entered, setEntered] = useState(false);
  const [box, setBox] = useState(null);
  const topRef = useRef(null);
  const familyRef = useRef(null);
  const open = useCallback((src) => setBox(src), []);
  const toFamily = () => familyRef.current?.scrollIntoView({ behavior: "smooth" });
  const toTop = () => window.scrollTo({ top: 0, behavior: "smooth" });

  return (
    <div className="ff" ref={topRef}>
      <Styles />
      {!entered && <Intro onDone={() => setEntered(true)} />}
      {entered && (
        <>
          <Hero onScroll={toFamily} />
          <main>
            <div className="ff-family-head" ref={familyRef}>
              <span className="ff-kicker"><Crown size={14} /> The Family</span>
              <h2 className="ff-head-title">The Ones Who Made It All</h2>
              <p className="ff-head-sub">One by one, the hearts that hold this family together.</p>
            </div>
            {PEOPLE.map((p, i) => (<Person key={p.name} person={p} index={i} onOpen={open} />))}
            <Gallery onOpen={open} />
            <Ending onTop={toTop} />
          </main>
          <footer className="ff-footer">
            <Flower2 size={16} /> Pachala Function · A Fairyland of Love, Family &amp; Blessings <Flower2 size={16} />
          </footer>
        </>
      )}
      {box && <Lightbox src={box} onClose={() => setBox(null)} />}
    </div>
  );
}

/* ============================================================
   STYLES — fairyland / heaven, royal gold, full 3D animation
   ============================================================ */
function Styles() {
  return (<style>{`
  .ff{
    --ink:#3b2a52; --plum:#6b3fa0; --gold:#d4af37; --gold2:#f4e2a1; --rose:#f7b6cd;
    --lav:#cdb4f6; --sky:#bcd7f7; --cream:#fff8ec; --white:#fffdf8;
    position:relative; min-height:100vh; overflow-x:hidden; color:var(--ink);
    font-family:'Poppins',system-ui,sans-serif;
    background:
      radial-gradient(60% 50% at 20% 10%, rgba(205,180,246,.65), transparent 60%),
      radial-gradient(55% 45% at 85% 15%, rgba(247,182,205,.55), transparent 60%),
      radial-gradient(70% 60% at 50% 100%, rgba(188,215,247,.55), transparent 60%),
      linear-gradient(180deg,#f4ecff 0%,#fdeef4 35%,#eaf2fe 70%,#fff8ec 100%);
  }
  .ff *{box-sizing:border-box;margin:0;}
  @media (prefers-reduced-motion: reduce){.ff *{animation-duration:.001s!important;}}
  .ff h1,.ff h2{font-family:'Playfair Display',serif;}

  /* sparkles + clouds */
  .ff-sparkles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
  .ff-sparkle{position:absolute;border-radius:50%;background:radial-gradient(circle,#fff,var(--gold));box-shadow:0 0 8px var(--gold2),0 0 14px rgba(212,175,55,.7);animation:ffTwinkle ease-in-out infinite;}
  @keyframes ffTwinkle{0%,100%{opacity:0;transform:scale(.4);}50%{opacity:1;transform:scale(1.3);}}
  .ff-clouds{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
  .ff-cloud{position:absolute;left:-30%;width:340px;height:120px;background:radial-gradient(60% 100% at 30% 60%,#fff,transparent 70%),radial-gradient(50% 90% at 60% 50%,#fff,transparent 70%),radial-gradient(45% 80% at 80% 65%,#fff,transparent 70%);filter:blur(6px);transform:scale(var(--s));animation:ffDrift var(--dur) linear infinite;animation-delay:var(--delay);}
  @keyframes ffDrift{from{transform:translateX(0) scale(var(--s));}to{transform:translateX(180vw) scale(var(--s));}}

  /* divider */
  .ff-divider{display:inline-flex;align-items:center;gap:10px;color:var(--gold);margin:10px 0;}
  .ff-divider i{display:block;width:54px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
  .ff-divider i:last-child{background:linear-gradient(90deg,var(--gold),transparent);}
  .ff-divider.sm i{width:38px;}

  /* intro */
  .ff-intro{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:radial-gradient(circle at 50% 40%,#2a1a44,#160c28);color:var(--cream);animation:ffIntroOut .8s ease 1.9s forwards;}
  .ff-intro-halo{position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.35),transparent 65%);filter:blur(20px);animation:ffPulse 3s ease-in-out infinite;}
  .ff-intro-crown{color:var(--gold2);filter:drop-shadow(0 0 16px var(--gold));animation:ffFloatY 3s ease-in-out infinite;z-index:1;}
  .ff-intro-title{position:relative;font-size:clamp(46px,9vw,92px);font-weight:800;letter-spacing:2px;z-index:1;
    background:linear-gradient(120deg,#fff,var(--gold2),#fff);-webkit-background-clip:text;background-clip:text;color:transparent;animation:ffShimmer 4s linear infinite;background-size:200% auto;}
  .ff-intro-sub{position:relative;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;letter-spacing:3px;opacity:.85;z-index:1;}
  .ff-intro-line{margin-top:18px;width:160px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;z-index:1;}
  .ff-intro-line i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold2));animation:ffLoad 1.9s ease forwards;}
  @keyframes ffLoad{to{width:100%;}}
  @keyframes ffIntroOut{to{opacity:0;visibility:hidden;}}
  @keyframes ffPulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}}
  @keyframes ffShimmer{to{background-position:200% center;}}
  @keyframes ffFloatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

  /* hero */
  .ff-hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 6vw 120px;overflow:hidden;}
  .ff-hero-glow{position:absolute;width:70vw;height:70vw;max-width:760px;max-height:760px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.7),rgba(247,182,205,.25) 45%,transparent 70%);filter:blur(10px);z-index:0;}
  .ff-hero-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:30px;}
  .ff-hero-frame-wrap{position:relative;transition:transform .2s ease;}
  .ff-hero-arch{position:relative;width:clamp(220px,34vw,330px);height:clamp(290px,46vw,440px);border-radius:50% 50% 46% 46%/60% 60% 40% 40%;overflow:hidden;
    border:3px solid rgba(255,255,255,.7);box-shadow:0 0 0 6px rgba(212,175,55,.45),0 30px 70px rgba(107,63,160,.4),inset 0 0 40px rgba(255,255,255,.3);
    animation:ffFloatY 6s ease-in-out infinite;}
  .ff-hero-arch-glow{position:absolute;inset:-2px;border-radius:inherit;box-shadow:inset 0 0 60px rgba(212,175,55,.4);z-index:2;pointer-events:none;}
  .ff-hero-pic{width:100%;height:100%;object-fit:cover;display:block;}
  .ff-hero-shine{position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-18deg);animation:ffShine 5s ease-in-out infinite;z-index:3;}
  @keyframes ffShine{0%,60%{left:-60%;}85%,100%{left:130%;}}
  .ff-hero-crown{position:absolute;top:-26px;left:50%;transform:translateX(-50%);color:var(--gold);filter:drop-shadow(0 4px 10px rgba(212,175,55,.6));animation:ffFloatY 4s ease-in-out infinite;z-index:4;}
  .ff-nameplate{text-align:center;display:flex;flex-direction:column;align-items:center;transition:transform .2s ease;}
  .ff-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--plum);background:rgba(255,255,255,.55);border:1px solid rgba(212,175,55,.5);padding:7px 18px;border-radius:30px;backdrop-filter:blur(8px);box-shadow:0 6px 20px rgba(107,63,160,.12);}
  .ff-name{font-size:clamp(52px,11vw,128px);font-weight:900;line-height:1;margin:14px 0 4px;letter-spacing:1px;
    background:linear-gradient(120deg,#7b3fb0,#d4af37 45%,#b8567f 90%);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 6px 18px rgba(212,175,55,.25));}
  .ff-name-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(18px,2.6vw,26px);color:var(--plum);letter-spacing:.5px;}
  .ff-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.6);border:1px solid rgba(212,175,55,.5);color:var(--plum);font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:1px;
    padding:11px 22px;border-radius:30px;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(107,63,160,.18);transition:.3s;z-index:3;}
  .ff-scroll:hover{transform:translateX(-50%) translateY(-3px);box-shadow:0 16px 40px rgba(212,175,55,.35);}
  .ff-scroll svg{animation:ffFloatY 1.8s ease-in-out infinite;}

  /* section heads */
  .ff-family-head,.ff-head{text-align:center;max-width:640px;margin:0 auto;padding:70px 6vw 10px;position:relative;z-index:2;}
  .ff-kicker{display:inline-flex;align-items:center;gap:8px;font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);}
  .ff-head-title{font-size:clamp(30px,5vw,52px);font-weight:800;margin:10px 0;color:var(--ink);
    background:linear-gradient(120deg,#6b3fa0,#b8567f);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .ff-head-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--plum);}

  /* person one-by-one */
  .ff-person{position:relative;display:flex;align-items:center;justify-content:center;gap:clamp(24px,5vw,72px);
    max-width:1100px;margin:0 auto;padding:70px 6vw;flex-wrap:wrap;}
  .ff-person.r{flex-direction:row-reverse;}
  .ff-person-sparkles{position:absolute;inset:0;pointer-events:none;z-index:0;}
  .ff-person-photo{position:relative;flex:0 0 auto;width:clamp(240px,32vw,330px);height:clamp(300px,40vw,420px);cursor:pointer;z-index:2;
    opacity:0;transform:perspective(1100px) rotateY(18deg) translateX(-40px);}
  .ff-person.r .ff-person-photo{transform:perspective(1100px) rotateY(-18deg) translateX(40px);}
  .ff-person.in .ff-person-photo{animation:ffPhotoIn 1s cubic-bezier(.2,.9,.3,1) forwards;}
  .ff-person.r.in .ff-person-photo{animation:ffPhotoInR 1s cubic-bezier(.2,.9,.3,1) forwards;}
  @keyframes ffPhotoIn{to{opacity:1;transform:perspective(1100px) rotateY(0) translateX(0);}}
  @keyframes ffPhotoInR{to{opacity:1;transform:perspective(1100px) rotateY(0) translateX(0);}}
  .ff-person-img{position:absolute;inset:0;border-radius:50% 50% 46% 46%/56% 56% 44% 44%;overflow:hidden;border:3px solid rgba(255,255,255,.8);
    box-shadow:0 0 0 5px rgba(212,175,55,.4),0 26px 60px rgba(107,63,160,.35);background:linear-gradient(135deg,var(--lav),var(--rose));}
  .ff-person-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .ff-person-img.ph img{display:none;}
  .ff-person-ring{position:absolute;inset:-16px;border-radius:50%;border:1px dashed rgba(212,175,55,.55);animation:ffSpin 26s linear infinite;}
  .ff-person-crown{position:absolute;top:-20px;left:50%;transform:translateX(-50%);color:var(--gold);filter:drop-shadow(0 4px 8px rgba(212,175,55,.5));z-index:3;animation:ffFloatY 4s ease-in-out infinite;}
  @keyframes ffSpin{to{transform:rotate(360deg);}}
  .ff-person-text{flex:1 1 280px;max-width:440px;text-align:left;position:relative;z-index:2;
    opacity:0;transform:translateY(30px);}
  .ff-person.in .ff-person-text{animation:ffUp .9s ease .25s forwards;}
  .ff-person.r .ff-person-text{text-align:right;}
  .ff-person.r .ff-divider{flex-direction:row-reverse;}
  @keyframes ffUp{to{opacity:1;transform:none;}}
  .ff-person-no{font-family:'Playfair Display',serif;font-size:60px;font-weight:800;color:rgba(212,175,55,.35);line-height:.8;display:block;}
  .ff-person-telugu{font-size:30px;color:var(--gold);font-weight:600;margin:4px 0;}
  .ff-person-name{font-size:clamp(34px,5vw,56px);font-weight:800;line-height:1;margin:2px 0 8px;
    background:linear-gradient(120deg,#6b3fa0,#b8567f);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .ff-person-role{display:inline-flex;align-items:center;gap:6px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--plum);
    background:rgba(255,255,255,.6);border:1px solid rgba(212,175,55,.5);padding:5px 14px;border-radius:20px;}
  .ff-person-cap{font-family:'Cormorant Garamond',serif;font-size:21px;line-height:1.5;color:var(--ink);margin:16px 0 4px;opacity:.92;}

  /* gallery */
  .ff-gallery{position:relative;padding-bottom:40px;z-index:2;}
  .ff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;max-width:1180px;margin:36px auto 0;padding:0 6vw;}
  .ff-grid-item{position:relative;border-radius:20px;cursor:pointer;opacity:0;transform:translateY(36px) scale(.96);transform-style:preserve-3d;}
  .ff-grid.in .ff-grid-item{animation:ffPop .8s cubic-bezier(.2,.9,.3,1) var(--d) forwards;}
  @keyframes ffPop{to{opacity:1;transform:translateY(0) scale(1);}}
  .ff-grid-item.big{grid-column:span 2;grid-row:span 2;}
  .ff-grid-img{position:relative;width:100%;height:100%;min-height:170px;border-radius:20px;overflow:hidden;
    border:2px solid rgba(255,255,255,.75);box-shadow:0 0 0 3px rgba(212,175,55,.3),0 18px 44px rgba(107,63,160,.28);
    background:linear-gradient(135deg,var(--lav),var(--rose),var(--sky));aspect-ratio:1/1;}
  .ff-grid-item.big .ff-grid-img{aspect-ratio:1/1;}
  .ff-grid-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s ease;}
  .ff-grid-item:hover .ff-grid-img img{transform:scale(1.07);}
  .ff-grid-img.ph img{display:none;}
  .ff-grid-shine{position:absolute;inset:0;background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,.35) 50%,transparent 60%);opacity:0;transition:.5s;}
  .ff-grid-item:hover .ff-grid-shine{opacity:1;}

  /* ending */
  .ff-ending{position:relative;min-height:80vh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:80px 6vw;margin-top:40px;}
  .ff-ending-inner{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;opacity:0;transform:translateY(30px);transition:1s;}
  .ff-ending.in .ff-ending-inner{opacity:1;transform:none;}
  .ff-ending-crown{color:var(--gold);filter:drop-shadow(0 4px 14px rgba(212,175,55,.5));animation:ffFloatY 4s ease-in-out infinite;}
  .ff-ending-text{font-family:'Playfair Display',serif;font-size:clamp(26px,4.5vw,46px);font-weight:700;line-height:1.45;color:var(--ink);}
  .ff-ending-text em{background:linear-gradient(120deg,var(--gold),#b8567f);-webkit-background-clip:text;background-clip:text;color:transparent;font-style:italic;}
  .ff-btn{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(120deg,var(--plum),#b8567f);color:#fff;font-weight:600;font-size:15px;
    border:none;padding:13px 28px;border-radius:30px;cursor:pointer;box-shadow:0 12px 34px rgba(107,63,160,.4);transition:.3s;margin-top:8px;}
  .ff-btn:hover{transform:translateY(-3px);box-shadow:0 18px 44px rgba(184,86,127,.5);}

  /* footer */
  .ff-footer{position:relative;z-index:2;text-align:center;padding:30px 6vw 46px;color:var(--plum);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;}
  .ff-footer svg{color:var(--gold);}

  /* lightbox */
  .ff-lb{position:fixed;inset:0;z-index:200;background:rgba(26,12,40,.86);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;padding:24px;animation:ffFade .3s ease;}
  @keyframes ffFade{from{opacity:0;}to{opacity:1;}}
  .ff-lb-frame{max-width:92vw;max-height:88vh;border-radius:18px;overflow:hidden;border:3px solid rgba(255,255,255,.8);box-shadow:0 0 0 5px rgba(212,175,55,.4),0 30px 80px rgba(0,0,0,.6);animation:ffZoom .4s cubic-bezier(.2,.9,.3,1);}
  .ff-lb-frame img{display:block;max-width:92vw;max-height:88vh;object-fit:contain;}
  @keyframes ffZoom{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
  .ff-lb-x{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:.25s;}
  .ff-lb-x:hover{background:var(--rose);color:#3b2a52;}

  @media (max-width:760px){
    .ff-person,.ff-person.r{flex-direction:column;text-align:center;}
    .ff-person-text,.ff-person.r .ff-person-text{text-align:center;}
    .ff-person.r .ff-divider,.ff-person .ff-divider{flex-direction:row;justify-content:center;}
    .ff-person-text{display:flex;flex-direction:column;align-items:center;}
    .ff-grid{grid-template-columns:repeat(2,1fr);}
    .ff-grid-item.big{grid-column:span 2;grid-row:span 1;}
  }
  `}</style>);
}

createRoot(document.getElementById("root")).render(<App />);
</script>
