<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memory Museum — 50 Frames of My Life</title>
<meta name="description" content="A neo-cinematic memory museum — 50 frames of my life." />
<style>
  html,body{margin:0;background:#050816;}
  #root{min-height:100vh;}
  .boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#CBD5E1;font-family:system-ui,sans-serif;letter-spacing:3px;text-transform:uppercase;font-size:13px;}

<script type="importmap">
{
  "imports": {

    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",

<body>
<div id="root"><div class="boot">Loading Memories…</div></div>

<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef, useCallback } from "react";
import { createRoot } from "react-dom/client";
import {
  Sparkles, Camera, Heart, MapPin, Compass, Rocket, ArrowRight,
  X, ChevronLeft, ChevronRight, Play, ArrowUp, Quote, Calendar,
} from "lucide-react";

/* ---------- THEME ---------- */
const C = {
  bg: "#050816", navy: "#0B1020", text: "#F8FAFC", muted: "#CBD5E1",
  cyan: "#22D3EE", purple: "#A855F7", gold: "#FACC15", pink: "#FB7185",
  glass: "rgba(255,255,255,0.08)", glassBorder: "rgba(255,255,255,0.18)",
};

/* ---------- CHAPTERS ---------- */
const CHAPTERS = [
  { id: 1, title: "The Beginning", icon: Sparkles, quote: "Every story begins with a small memory.", desc: "Childhood, first steps, and the small happy moments.", glow: C.gold, accent: "#fed7aa" },
  { id: 2, title: "People Who Matter", icon: Heart, quote: "Some people are not just part of life — they become home.", desc: "Amma, Nana, Ammamma, Tatha, Mama, and dear friends.", glow: C.pink, accent: "#fecdd3" },
  { id: 3, title: "Places & Adventures", icon: Compass, quote: "Every place leaves something behind.", desc: "Travels, cities, mountains, and roads taken.", glow: C.cyan, accent: "#a5f3fc" },
  { id: 4, title: "Turning Points", icon: Camera, quote: "Some moments change who we become.", desc: "Achievements, hard days, and quiet triumphs.", glow: C.purple, accent: "#e9d5ff" },
  { id: 5, title: "The Road Ahead", icon: Rocket, quote: "The future is a memory waiting to happen.", desc: "Dreams, goals, and everything still to come.", glow: C.cyan, accent: "#a5f3fc" },
];

/* ---------- REAL PHOTOS ---------- */
const PHOTO_BASE = "https://cdn.jsdelivr.net/gh/Karthikbangari/memory-museum@main/photos";
const img = (file) => (file ? `${PHOTO_BASE}/${file}` : null);
const IMAGES = {
  // Chapter 1 — The Beginning (1–10)   [1 = hero / first pic]
  1: img("hero.jpg"), 2: img("wa-01.jpg"), 3: img("wa-02.jpg"), 4: img("wa-03.jpg"),
  5: img("wa-04.jpg"), 6: img("wa-05.jpg"), 7: img("wa-06.jpg"), 8: img("wa-07.jpg"),
  9: img("wa-08.jpg"), 10: img("wa-09.jpg"),
  // Chapter 2 — People (11–20)
  11: img("wa-10.jpg"), 12: img("wa-11.jpg"), 13: img("ammamma.jpg"), 14: img("wa-12.jpg"),
  15: img("wa-13.jpg"), 17: img("photo-02.jpg"), 18: img("photo-03.jpg"),
  19: img("family.jpg"), 20: img("photo-05.jpg"),
  // Chapter 3 — Places (21–30)
  21: img("photo-06.jpg"), 22: img("photo-08.jpg"), 23: img("photo-09.jpg"), 24: img("photo-12.jpg"),
  25: img("photo-13.jpg"), 26: img("photo-14.jpg"), 27: img("photo-15.jpg"), 28: img("photo-16.jpg"),
  29: img("photo-17.jpg"), 30: img("photo-18.jpg"),
  // Chapter 4 — Turning Points (31–40)
  31: img("photo-19.jpg"), 32: img("photo-20.jpg"), 33: img("photo-21.jpg"), 34: img("photo-22.jpg"),
  35: img("photo-23.jpg"), 36: img("photo-24.jpg"), 37: img("photo-25.jpg"), 38: img("photo-26.jpg"),
  39: img("photo-27.jpg"), 40: img("photo-28.jpg"),
  // Chapter 5 — The Road Ahead (41–50)
  41: img("photo-29.jpg"), 42: img("photo-30.jpg"), 43: img("photo-31.jpg"), 44: img("photo-32.jpg"),
  45: img("photo-33.jpg"), 46: img("photo-34.jpg"), 47: img("photo-35.jpg"), 48: img("photo-36.jpg"),
  49: img("photo-37.jpg"), 50: img("photo-38.jpg"),
};

const PEOPLE = [
  { id: 11, title: "Amma", year: "Always", location: "Home", emotion: "Unconditional", caption: "The first heartbeat I ever knew. Her hands taught me everything soft and strong.", tag: "Mother", featured: true },
  { id: 12, title: "Nana", year: "Always", location: "Home", emotion: "Steady", caption: "He never said much, but he showed up every single day. My quiet hero.", tag: "Father", featured: false },
  { id: 13, title: "Ammamma", year: "Childhood", location: "Grandma's House", emotion: "Warm", caption: "Stories at night, sweets hidden in steel boxes, and a lap that fixed everything.", tag: "Grandmother", featured: true },
  { id: 14, title: "Tatha", year: "Childhood", location: "Veranda", emotion: "Wise", caption: "Morning walks and old songs. He carried a whole world in his patience.", tag: "Grandfather", featured: false },
  { id: 15, title: "Mama", year: "Summers", location: "Village", emotion: "Playful", caption: "The cool uncle who turned every holiday into an adventure I never wanted to end.", tag: "Uncle", featured: false },
  { id: 17, title: "My Sibling", year: "Forever", location: "Everywhere", emotion: "Loyal", caption: "First friend, first rival, forever teammate against the whole world.", tag: "Sibling", featured: false },
  { id: 18, title: "Best Friend", year: "School", location: "Classroom", emotion: "Joyful", caption: "We laughed until it hurt and grew up without ever growing apart.", tag: "Friend", featured: false },
  { id: 19, title: "The Whole Family", year: "Reunions", location: "Living Room", emotion: "Belonging", caption: "All of us in one frame, loud and imperfect and completely home.", tag: "Loved Ones", featured: false },
  { id: 20, title: "Someone Special", year: "Recent", location: "Quiet Evenings", emotion: "Tender", caption: "The person who made ordinary days feel like the good old days.", tag: "Special", featured: false },
];

const TITLE_BANK = {
  1: ["First Light", "Little Feet", "School Days", "Birthday Cake", "Rainy Afternoons", "The Old Swing", "Cartoon Mornings", "Scraped Knees", "Best Friend Forever", "Summer of Ice Cream"],
  3: ["Mountain Roads", "City Lights", "The Coastline", "Train Window", "Forest Trail", "Night Market", "Sunrise Hike", "Old Town Streets", "Desert Sky", "The Long Drive"],
  4: ["Graduation Day", "First Job", "The Big Move", "A Goodbye", "Standing Again", "The Proposal", "New Beginnings", "Learning to Let Go", "The Comeback", "A Promise Kept"],
  5: ["Tomorrow's Plan", "The Dream House", "Far Horizons", "Building Something", "A New Chapter", "Goals on Paper", "The Next Adventure", "Future Self", "Open Roads", "What Comes Next"],
};
const LOCATIONS = { 1: "Hometown", 3: "On the Road", 4: "Crossroads", 5: "Somewhere Ahead" };
const EMOTIONS = { 1: "Nostalgic", 3: "Alive", 4: "Inspired", 5: "Hopeful" };

function buildMemories() {
  const list = [];
  for (let i = 0; i < 10; i++) {
    const id = 1 + i;
    list.push({ id, chapter: 1, image: IMAGES[id] ?? null, title: TITLE_BANK[1][i], year: `200${i % 10}`, location: LOCATIONS[1], emotion: EMOTIONS[1], caption: "A small moment that quietly became a core memory.", featured: i === 0 });
  }
  PEOPLE.forEach((p) => list.push({ ...p, chapter: 2, image: IMAGES[p.id] ?? null }));
  [3, 4, 5].forEach((ch, ci) => {
    for (let i = 0; i < 10; i++) {
      const id = ch === 3 ? 21 + i : ch === 4 ? 31 + i : 41 + i;
      list.push({
        id, chapter: ch, image: IMAGES[id] ?? null,
        title: TITLE_BANK[ch][i],
        year: `20${10 + ci * 4 + (i % 4)}`,
        location: LOCATIONS[ch],
        emotion: EMOTIONS[ch],
        caption: ch === 3 ? "A place that left a mark I still carry." : ch === 4 ? "The kind of day that splits life into before and after." : "A promise I'm making to the years ahead.",
        featured: (ch === 3 && i === 4) || (ch === 4 && i === 0) || (ch === 5 && i === 9),
      });
    }
  });
  return list;
}
const MEMORIES = buildMemories();
const FEATURED = MEMORIES.filter((m) => m.featured).slice(0, 5);

function memoryGradient(m) {
  const palettes = {
    1: ["#7c2d12", "#b45309", "#fbbf24"], 2: ["#831843", "#be185d", "#fb7185"],
    3: ["#0e7490", "#0891b2", "#22d3ee"], 4: ["#581c87", "#7e22ce", "#a855f7"],
    5: ["#0c4a6e", "#155e75", "#22d3ee"],
  };
  const p = palettes[m.chapter];
  const a = (m.id * 47) % 360;
  return `linear-gradient(${a}deg, ${p[0]} 0%, ${p[1]} 55%, ${p[2]} 120%)`;
}

function useReveal(threshold = 0.18) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const ob = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setShown(true); ob.disconnect(); } },
      { threshold }
    );
    ob.observe(el);
    return () => ob.disconnect();
  }, [threshold]);
  return [ref, shown];
}

function MemoryImage({ m, style }) {
  return (
    <div className="mm-img" style={{ background: memoryGradient(m), ...style }}>
      {m.image ? (
        <img src={m.image} alt={m.title} loading="lazy" className="mm-img-real"
             onError={(e) => { e.currentTarget.style.display = "none"; }} />
      ) : (
        <div className="mm-img-ph">
          <Camera size={22} opacity={0.7} />
          <span>{m.title}</span>
        </div>
      )}
      <div className="mm-img-vig" />
    </div>
  );
}

function PhotoCard({ m, onOpen, aspect = "3/4", small = false }) {
  const [t, setT] = useState({ x: 0, y: 0 });
  const move = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    setT({ x: py * -10, y: px * 10 });
  };
  const ch = CHAPTERS[m.chapter - 1];
  return (
    <button className="mm-card" onClick={() => onOpen(m)} onMouseMove={move}
      onMouseLeave={() => setT({ x: 0, y: 0 })}
      style={{ aspectRatio: aspect, transform: `perspective(900px) rotateX(${t.x}deg) rotateY(${t.y}deg)`, "--glow": ch.glow }}>
      <MemoryImage m={m} />
      <div className="mm-card-overlay">
        <div className="mm-card-tags">
          <span className="mm-chip" style={{ borderColor: ch.glow, color: ch.glow }}>{m.emotion}</span>
          {!small && <span className="mm-year"><Calendar size={11} /> {m.year}</span>}
        </div>
        <div className="mm-card-body">
          <h4>{m.title}</h4>
          {!small && <p className="mm-loc"><MapPin size={11} /> {m.location}</p>}
          <p className="mm-cap">{m.caption}</p>
        </div>
      </div>
      <div className="mm-card-ring" />
    </button>
  );
}

function IntroLoader({ onDone }) {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    let n = 0;
    const t = setInterval(() => {
      n += 1; setProgress(n);
      if (n >= 50) { clearInterval(t); setTimeout(onDone, 900); }
    }, 36);
    return () => clearInterval(t);
  }, [onDone]);
  return (
    <div className="mm-intro">
      <div className="mm-intro-aurora" />
      <div className="mm-stars">
        {Array.from({ length: 50 }).map((_, i) => (
          <span key={i} className={`mm-star ${i < progress ? "on" : ""}`} style={{ "--d": `${i * 0.02}s` }} />
        ))}
      </div>
      <p className="mm-intro-text">Loading Memories…</p>
      <p className="mm-intro-count">{progress} / 50</p>
    </div>
  );
}

function Hero({ onEnter }) {
  const words = ["Memory", "Museum"];
  const stack = MEMORIES.filter((m) => [1, 11, 13, 21, 31, 41, 35].includes(m.id));
  return (
    <header className="mm-hero">
      <div className="mm-hero-aurora" />
      <div className="mm-hero-inner">
        <div className="mm-hero-left">
          <span className="mm-eyebrow"><Sparkles size={13} /> A Neo-Cinematic Memory Museum</span>
          <h1 className="mm-title">
            {words.map((w, i) => (<span key={w} className="mm-title-word" style={{ "--d": `${0.2 + i * 0.18}s` }}>{w}</span>))}
          </h1>
          <p className="mm-subtitle">50 Frames of My Life</p>
          <p className="mm-tagline">A cinematic journey through the moments, people, and places that became memories.</p>
          <button className="mm-cta" onClick={onEnter}>Enter the Museum <ArrowRight size={17} /></button>
          <div className="mm-stats">
            {[["50", "Photos"], ["5", "Chapters"], ["1", "Story"]].map(([n, l]) => (
              <div key={l} className="mm-stat"><strong>{n}</strong><span>{l}</span></div>
            ))}
          </div>
        </div>
        <div className="mm-hero-right">
          <div className="mm-stack">
            {stack.map((m, i) => (
              <div key={m.id} className="mm-stack-card" style={{ "--i": i, "--n": stack.length }}>
                <MemoryImage m={m} />
              </div>
            ))}
            <div className="mm-stack-glow" />
          </div>
        </div>
      </div>
      <div className="mm-scroll-hint"><span /></div>
    </header>
  );
}

function ControlRoom({ onChapter }) {
  const [ref, shown] = useReveal();
  const [bar, setBar] = useState(0);
  useEffect(() => { if (shown) { const t = setTimeout(() => setBar(100), 200); return () => clearTimeout(t); } }, [shown]);
  return (
    <section className="mm-section" ref={ref}>
      <SectionHead kicker="Control Room" title="The Memory Dashboard" sub="A futuristic look at the whole collection before you step inside." />
      <div className={`mm-dash ${shown ? "in" : ""}`}>
        <div className="mm-dash-stats">
          {[["Total Memories", "50", C.cyan], ["Chapters", "5", C.purple], ["Featured", "5", C.gold]].map(([l, v, c]) => (
            <div key={l} className="mm-dash-stat"><span style={{ color: c }}>{v}</span><label>{l}</label></div>
          ))}
        </div>
        <div className="mm-dash-progress">
          <div className="mm-dash-prow"><span>Journey Progress</span><span>{bar}%</span></div>
          <div className="mm-bar"><i style={{ width: `${bar}%` }} /></div>
        </div>
        <div className="mm-dash-orbit">
          <div className="mm-orbit-ring" /><div className="mm-orbit-ring r2" />
          <div className="mm-orbit-core">50</div>
        </div>
      </div>
      <div className="mm-chapters">
        {CHAPTERS.map((c, i) => {
          const cover = MEMORIES.find((m) => m.chapter === c.id);
          const Icon = c.icon;
          return (
            <div key={c.id} className={`mm-chcard ${shown ? "in" : ""}`} style={{ "--d": `${i * 0.09}s`, "--glow": c.glow }}>
              <div className="mm-chcard-img"><MemoryImage m={cover} /><span className="mm-chnum">0{c.id}</span></div>
              <div className="mm-chcard-body">
                <div className="mm-chcard-h"><Icon size={16} style={{ color: c.glow }} /><h3>{c.title}</h3></div>
                <p className="mm-chcard-desc">{c.desc}</p>
                <p className="mm-chcard-quote"><Quote size={12} /> {c.quote}</p>
                <div className="mm-chcard-f"><span>10 memories</span>
                  <button onClick={() => onChapter(c.id)} style={{ color: c.glow }}>Enter <ArrowRight size={13} /></button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

function Timeline({ onChapter }) {
  const [ref, shown] = useReveal(0.1);
  return (
    <section className="mm-section" ref={ref}>
      <SectionHead kicker="The Story" title="Holographic Timeline" sub="Five chapters, one continuous thread of memory." />
      <div className="mm-tl">
        <div className={`mm-tl-line ${shown ? "in" : ""}`} />
        {CHAPTERS.map((c, i) => {
          const cover = MEMORIES.find((m) => m.chapter === c.id);
          const left = i % 2 === 0;
          return (
            <div key={c.id} className={`mm-tl-row ${left ? "l" : "r"} ${shown ? "in" : ""}`} style={{ "--d": `${i * 0.12}s`, "--glow": c.glow }}>
              <div className="mm-tl-node" />
              <div className="mm-tl-card">
                <div className="mm-tl-img"><MemoryImage m={cover} /></div>
                <div className="mm-tl-info">
                  <span className="mm-tl-num" style={{ color: c.glow }}>Chapter 0{c.id}</span>
                  <h3>{c.title}</h3>
                  <p>{c.quote}</p>
                  <button onClick={() => onChapter(c.id)}>View Chapter <ArrowRight size={13} /></button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

function ChapterSection({ chapter, onOpen, anchorRef }) {
  const c = CHAPTERS[chapter - 1];
  const mems = MEMORIES.filter((m) => m.chapter === chapter);
  const [ref, shown] = useReveal(0.05);
  const Icon = c.icon;
  return (
    <section className="mm-section mm-chapter" ref={(el) => { ref.current = el; if (anchorRef) anchorRef.current = el; }} style={{ "--glow": c.glow, "--accent": c.accent }}>
      <div className="mm-chapter-head">
        <span className="mm-chapter-num" style={{ color: c.glow }}><Icon size={15} /> Chapter 0{chapter}</span>
        <h2>{c.title}</h2>
        <p className="mm-chapter-quote">{c.quote}</p>
      </div>
      <div className={`mm-layout-${chapter} ${shown ? "in" : ""}`}>
        {chapter === 1 && <LayoutCollage mems={mems} onOpen={onOpen} />}
        {chapter === 2 && <LayoutPeople mems={mems} onOpen={onOpen} />}
        {chapter === 3 && <LayoutRoute mems={mems} onOpen={onOpen} />}
        {chapter === 4 && <LayoutPoster mems={mems} onOpen={onOpen} />}
        {chapter === 5 && <LayoutFuture mems={mems} onOpen={onOpen} />}
      </div>
    </section>
  );
}

function LayoutCollage({ mems, onOpen }) {
  return (
    <div className="mm-collage">
      <div className="mm-collage-hero"><PhotoCard m={mems[0]} onOpen={onOpen} aspect="4/5" /></div>
      <div className="mm-collage-grid">
        {mems.slice(1).map((m) => (<div key={m.id} className="mm-collage-item"><PhotoCard m={m} onOpen={onOpen} aspect="1/1" small /></div>))}
      </div>
    </div>
  );
}

function LayoutPeople({ mems, onOpen }) {
  const center = mems.find((m) => m.title === "Amma") || mems[0];
  const around = mems.filter((m) => m.id !== center.id);
  return (
    <div className="mm-people">
      <div className="mm-people-center"><PhotoCard m={center} onOpen={onOpen} aspect="4/5" /></div>
      <div className="mm-people-wall">
        {around.map((m) => (
          <div key={m.id} className="mm-people-item">
            <PhotoCard m={m} onOpen={onOpen} aspect="1/1" small />
            <span className="mm-people-tag">{m.tag}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function LayoutRoute({ mems, onOpen }) {
  return (
    <div className="mm-route">
      <div className="mm-route-grid-bg" />
      {mems.map((m, i) => (
        <div key={m.id} className="mm-route-stop" style={{ "--i": i }}>
          <span className="mm-route-dot" />
          <PhotoCard m={m} onOpen={onOpen} aspect="4/3" />
          <span className="mm-route-loc"><MapPin size={11} /> {m.location}</span>
        </div>
      ))}
    </div>
  );
}

function LayoutPoster({ mems, onOpen }) {
  return (
    <div className="mm-posters">
      {mems.map((m, i) => (
        <div key={m.id} className={`mm-poster ${i % 3 === 0 ? "wide" : ""}`}>
          <PhotoCard m={m} onOpen={onOpen} aspect={i % 3 === 0 ? "16/9" : "3/4"} />
          <p className="mm-poster-quote">{m.caption}</p>
        </div>
      ))}
    </div>
  );
}

function LayoutFuture({ mems, onOpen }) {
  const last = mems[mems.length - 1];
  const rest = mems.slice(0, -1);
  return (
    <div className="mm-future">
      <div className="mm-future-floor" />
      <div className="mm-future-grid">
        {rest.map((m, i) => (<div key={m.id} className="mm-future-panel" style={{ "--i": i }}><PhotoCard m={m} onOpen={onOpen} aspect="3/4" small /></div>))}
      </div>
      <div className="mm-future-final">
        <PhotoCard m={last} onOpen={onOpen} aspect="16/9" />
        <p className="mm-future-vision">The future is a memory waiting to happen.</p>
      </div>
    </div>
  );
}

function Featured({ onOpen }) {
  const [active, setActive] = useState(0);
  const n = FEATURED.length;
  const go = (d) => setActive((p) => (p + d + n) % n);
  return (
    <section className="mm-section">
      <SectionHead kicker="Featured" title="Featured Memories" sub="Five frames that matter most — shown like movie posters." />
      <div className="mm-carousel">
        <button className="mm-car-nav l" onClick={() => go(-1)}><ChevronLeft size={20} /></button>
        <div className="mm-car-track">
          {FEATURED.map((m, i) => {
            const off = i - active;
            const a = Math.abs(off);
            const step = window.innerWidth < 900 ? 175 : 230;
            const style = {
              transform: `translateX(${off * step}px) scale(${1 - 0.18 * off * off})`,
              filter: `blur(${a * 1.5}px)`,
              opacity: off === 0 ? 1 : 0.4,
              zIndex: 10 - a,
            };
            return (
              <div key={m.id} className="mm-car-card" style={style} onClick={() => (off === 0 ? onOpen(m) : setActive(i))}>
                <MemoryImage m={m} />
                <div className="mm-car-info">
                  <span className="mm-car-num">0{i + 1} / 0{n}</span>
                  <h3>{m.title}</h3>
                  <span className="mm-chip" style={{ borderColor: CHAPTERS[m.chapter - 1].glow, color: CHAPTERS[m.chapter - 1].glow }}>{m.emotion}</span>
                  <p>{m.caption}</p>
                </div>
              </div>
            );
          })}
        </div>
        <button className="mm-car-nav r" onClick={() => go(1)}><ChevronRight size={20} /></button>
      </div>
      <div className="mm-car-dots">{FEATURED.map((_, i) => (<button key={i} className={i === active ? "on" : ""} onClick={() => setActive(i)} />))}</div>
    </section>
  );
}

function Modal({ index, onClose, onNav }) {
  const m = MEMORIES[index];
  const c = CHAPTERS[m.chapter - 1];
  useEffect(() => {
    const k = (e) => { if (e.key === "Escape") onClose(); if (e.key === "ArrowLeft") onNav(-1); if (e.key === "ArrowRight") onNav(1); };
    window.addEventListener("keydown", k);
    document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", k); document.body.style.overflow = ""; };
  }, [onClose, onNav]);
  return (
    <div className="mm-modal" onClick={onClose}>
      <div className="mm-modal-box" onClick={(e) => e.stopPropagation()} style={{ "--glow": c.glow }}>
        <button className="mm-modal-x" onClick={onClose}><X size={18} /></button>
        <div className="mm-modal-img"><MemoryImage m={m} /></div>
        <div className="mm-modal-info">
          <span className="mm-modal-ch" style={{ color: c.glow }}>{c.title}</span>
          <h2>{m.title}</h2>
          <div className="mm-modal-meta">
            <span><Calendar size={13} /> {m.year}</span>
            <span><MapPin size={13} /> {m.location}</span>
            <span className="mm-chip" style={{ borderColor: c.glow, color: c.glow }}>{m.emotion}</span>
          </div>
          <p className="mm-modal-cap">{m.caption}</p>
          <div className="mm-modal-nav">
            <button onClick={() => onNav(-1)}><ChevronLeft size={16} /> Previous</button>
            <button onClick={() => onNav(1)}>Next <ChevronRight size={16} /></button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Ending({ onReplay, onTop }) {
  const [ref, shown] = useReveal(0.2);
  return (
    <section className="mm-ending" ref={ref}>
      <div className="mm-ending-bg">
        {MEMORIES.map((m, i) => (<div key={m.id} className="mm-ending-float" style={{ "--i": i, background: memoryGradient(m) }} />))}
      </div>
      <div className={`mm-ending-content ${shown ? "in" : ""}`}>
        <p className="mm-ending-text">These are not just photos.<br />They are pieces of my life,<br />my people, my journey.</p>
        <div className="mm-ending-btns">
          <button className="mm-cta" onClick={onReplay}><Play size={15} /> Replay Journey</button>
          <button className="mm-cta ghost" onClick={onTop}><ArrowUp size={15} /> Back to Top</button>
        </div>
      </div>
    </section>
  );
}

function SectionHead({ kicker, title, sub }) {
  const [ref, shown] = useReveal(0.4);
  return (
    <div className={`mm-head ${shown ? "in" : ""}`} ref={ref}>
      <span className="mm-kicker">{kicker}</span>
      <h2>{title}</h2>
      <p>{sub}</p>
    </div>
  );
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [modal, setModal] = useState(null);
  const topRef = useRef(null);
  const museumRef = useRef(null);
  const chapterRefs = { 1: useRef(null), 2: useRef(null), 3: useRef(null), 4: useRef(null), 5: useRef(null) };

  const open = useCallback((m) => setModal(MEMORIES.findIndex((x) => x.id === m.id)), []);
  const nav = useCallback((d) => setModal((p) => (p + d + MEMORIES.length) % MEMORIES.length), []);
  const scrollTo = (ref) => ref?.current?.scrollIntoView({ behavior: "smooth" });
  const replay = () => { setLoaded(false); setTimeout(() => { setLoaded(true); window.scrollTo({ top: 0 }); }, 50); };

  return (
    <div className="mm-root" ref={topRef}>
      <Styles />
      {!loaded && <IntroLoader onDone={() => setLoaded(true)} />}
      {loaded && (
        <>
          <Hero onEnter={() => scrollTo(museumRef)} />
          <main ref={museumRef}>
            <ControlRoom onChapter={(id) => scrollTo(chapterRefs[id])} />
            <Timeline onChapter={(id) => scrollTo(chapterRefs[id])} />
            {[1, 2, 3, 4, 5].map((ch) => (<ChapterSection key={ch} chapter={ch} onOpen={open} anchorRef={chapterRefs[ch]} />))}
            <Featured onOpen={open} />
            <Ending onReplay={replay} onTop={() => scrollTo(topRef)} />
          </main>
          <footer className="mm-footer">Memory Museum — 50 Frames of My Life · Made with love for Amma, Nana, Ammamma, Tatha &amp; Mama</footer>
        </>
      )}
      {modal !== null && <Modal index={modal} onClose={() => setModal(null)} onNav={nav} />}
    </div>
  );
}

    @keyframes mmPop{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
    .mm-route{position:relative;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px 22px;padding:30px 0;}
    .mm-route-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(34,211,238,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.06) 1px,transparent 1px);background-size:40px 40px;mask:radial-gradient(circle at 50% 50%,#000,transparent 90%);z-index:0;}
    .mm-route-stop{position:relative;z-index:1;}
    .mm-route-dot{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);}
    .mm-route-loc{display:flex;gap:5px;align-items:center;justify-content:center;font-size:11px;color:var(--cyan);margin-top:8px;font-weight:600;}
    .mm-layout-3 .mm-route-stop{opacity:0;transform:translateY(30px);}
    .mm-layout-3.in .mm-route-stop{animation:mmUp .7s ease both;animation-delay:calc(var(--i) * .06s);}
    .mm-posters{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
    .mm-poster{grid-column:span 1;}
    .mm-poster.wide{grid-column:span 2;}
    .mm-poster-quote{font-size:13px;color:var(--muted);font-style:italic;margin-top:10px;line-height:1.5;}
    .mm-layout-4 .mm-poster{opacity:0;transform:translateY(40px);}
    .mm-layout-4.in .mm-poster{animation:mmUp .8s ease both;}
    .mm-layout-4.in .mm-poster:nth-child(odd){animation-delay:.1s;}
    .mm-layout-4.in .mm-poster:nth-child(even){animation-delay:.22s;}
    .mm-future{position:relative;}
    .mm-future-floor{position:absolute;bottom:-40px;left:-6vw;right:-6vw;height:200px;background:linear-gradient(transparent,rgba(34,211,238,.12));background-image:linear-gradient(rgba(34,211,238,.2) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.15) 1px,transparent 1px);background-size:50px 50px;transform:perspective(300px) rotateX(60deg);mask:linear-gradient(transparent,#000);z-index:0;}
    .mm-future-grid{position:relative;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;z-index:1;}
    .mm-future-panel{border-radius:16px;overflow:hidden;box-shadow:0 0 30px rgba(34,211,238,.12);}
    .mm-future-final{position:relative;margin-top:34px;max-width:760px;margin-left:auto;margin-right:auto;z-index:1;}
    .mm-future-vision{text-align:center;margin-top:18px;font-size:clamp(16px,2.4vw,24px);font-weight:700;font-style:italic;background:linear-gradient(120deg,var(--cyan),#fff,var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;}
    .mm-layout-5 .mm-future-panel,.mm-layout-5 .mm-future-final{opacity:0;transform:translateY(40px) scale(.95);}
    .mm-layout-5.in .mm-future-panel{animation:mmPop .7s ease both;animation-delay:calc(var(--i) * .06s);}
    .mm-layout-5.in .mm-future-final{animation:mmPop .9s ease .5s both;}
    .mm-carousel{position:relative;display:flex;align-items:center;justify-content:center;gap:14px;min-height:440px;}
    .mm-car-track{position:relative;width:340px;height:440px;}
    .mm-car-card{position:absolute;inset:0;border-radius:22px;overflow:hidden;border:1px solid var(--gb);cursor:pointer;transition:.5s cubic-bezier(.16,1,.3,1);box-shadow:0 30px 60px rgba(0,0,0,.55);}
    .mm-car-info{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;gap:7px;padding:22px;background:linear-gradient(to top,rgba(5,8,22,.95),transparent 65%);text-align:left;}
    .mm-car-num{font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:800;}
    .mm-car-info h3{font-size:24px;font-weight:900;}
    .mm-car-info .mm-chip{align-self:flex-start;}
    .mm-car-info p{font-size:12.5px;color:var(--muted);line-height:1.5;}
    .mm-car-nav{width:46px;height:46px;border-radius:50%;background:var(--glass);border:1px solid var(--gb);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);transition:.25s;z-index:20;flex-shrink:0;}
    .mm-car-nav:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 20px rgba(34,211,238,.3);}
    .mm-car-dots{display:flex;gap:8px;justify-content:center;margin-top:24px;}
    .mm-car-dots button{width:8px;height:8px;border-radius:50%;border:none;background:rgba(255,255,255,.2);cursor:pointer;transition:.3s;}
    .mm-car-dots button.on{width:24px;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--purple));}
    .mm-modal{position:fixed;inset:0;z-index:200;background:rgba(3,5,15,.7);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;padding:24px;animation:mmFade .3s ease;}
    @keyframes mmFade{from{opacity:0;}to{opacity:1;}}
    .mm-modal-box{position:relative;display:grid;grid-template-columns:1.3fr 1fr;max-width:1000px;width:100%;max-height:88vh;background:var(--navy);border:1px solid var(--glow);border-radius:24px;overflow:hidden;box-shadow:0 0 60px color-mix(in srgb,var(--glow) 25%,transparent);animation:mmZoom .4s cubic-bezier(.16,1,.3,1);}
    @keyframes mmZoom{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
    .mm-modal-x{position:absolute;top:14px;right:14px;z-index:5;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid var(--gb);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
    .mm-modal-x:hover{background:var(--pink);}
    .mm-modal-img{min-height:300px;}
    .mm-modal-info{padding:34px;display:flex;flex-direction:column;justify-content:center;animation:mmSlide .5s ease .15s both;}
    @keyframes mmSlide{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
    .mm-modal-ch{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
    .mm-modal-info h2{font-size:34px;font-weight:900;margin:8px 0 14px;letter-spacing:-1px;}
    .mm-modal-meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;}
    .mm-modal-meta span{font-size:12px;color:var(--muted);display:inline-flex;gap:5px;align-items:center;}
    .mm-modal-cap{color:var(--muted);font-size:15px;line-height:1.65;}
    .mm-modal-nav{display:flex;gap:10px;margin-top:24px;}
    .mm-modal-nav button{flex:1;background:var(--glass);border:1px solid var(--gb);color:var(--text);padding:11px;border-radius:12px;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:.25s;}
    .mm-modal-nav button:hover{border-color:var(--glow);color:var(--glow);}
    .mm-ending{position:relative;min-height:90vh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:60px 6vw;}
    .mm-ending-bg{position:absolute;inset:0;filter:blur(40px) brightness(.5);opacity:.6;}
    .mm-ending-float{position:absolute;width:120px;height:120px;border-radius:20px;left:calc((var(--i) * 37% ) % 100%);top:calc((var(--i) * 53%) % 100%);animation:mmDrift 18s ease-in-out infinite;animation-delay:calc(var(--i) * -.4s);}
    @keyframes mmDrift{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.1);}}
    .mm-ending-content{position:relative;text-align:center;opacity:0;transform:translateY(30px);transition:1s;}
    .mm-ending-content.in{opacity:1;transform:none;}
    .mm-ending-text{font-size:clamp(24px,4vw,44px);font-weight:800;line-height:1.5;margin-bottom:34px;background:linear-gradient(120deg,#fff,#a5f3fc,#e9d5ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .mm-ending-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
    .mm-footer{text-align:center;padding:34px 6vw 56px;color:var(--muted);font-size:13px;border-top:1px solid rgba(255,255,255,.06);line-height:1.7;}
    @media (max-width:900px){
      .mm-hero-inner{grid-template-columns:1fr;gap:36px;}
      .mm-hero-right{order:-1;}
      .mm-dash{grid-template-columns:1fr;}
      .mm-collage{grid-template-columns:1fr;}
      .mm-people{grid-template-columns:1fr;}
      .mm-posters{grid-template-columns:1fr 1fr;}
      .mm-poster.wide{grid-column:span 2;}
      .mm-modal-box{grid-template-columns:1fr;max-height:92vh;overflow-y:auto;}
      .mm-modal-img{min-height:240px;}
      .mm-tl-line{left:18px;}
      .mm-tl-row,.mm-tl-row.l,.mm-tl-row.r{width:100%;left:0;justify-content:flex-start;padding-left:42px;padding-right:8px;}
      .mm-tl-row.l .mm-tl-node,.mm-tl-row.r .mm-tl-node{left:11px;right:auto;}
    }
    @media (max-width:560px){
      .mm-section{padding:60px 5vw;}
      .mm-collage-grid{grid-template-columns:1fr 1fr;}
      .mm-people-wall{grid-template-columns:1fr 1fr;}
      .mm-posters{grid-template-columns:1fr;}
      .mm-poster.wide{grid-column:span 1;}
      .mm-stats{flex-wrap:wrap;}
    }
    `}</style>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
