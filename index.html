/* ============================================================
   3D PARALLAX SKY — shared tilt (mouse + gyroscope) + scroll depth
   ============================================================ */
const TiltCtx = React.createContext({ sx: null, sy: null });
const useTilt = () => React.useContext(TiltCtx);
function TiltProvider({ children }) {
  const mx = useMotionValue(0), my = useMotionValue(0);
  const sx = useSpring(mx, { stiffness: 45, damping: 20, mass: 0.6 });
  const sy = useSpring(my, { stiffness: 45, damping: 20, mass: 0.6 });
  useEffect(() => {
    const onMouse = (e) => { mx.set(e.clientX / innerWidth - 0.5); my.set(e.clientY / innerHeight - 0.5); };
    const onOrient = (e) => {
      if (e.gamma == null && e.beta == null) return;
      mx.set(Math.max(-0.5, Math.min(0.5, (e.gamma || 0) / 40)));
      my.set(Math.max(-0.5, Math.min(0.5, ((e.beta || 0) - 42) / 40)));
    };
    addEventListener("mousemove", onMouse, { passive: true });

    const attach = () => addEventListener("deviceorientation", onOrient, { passive: true });
    const needsPerm = typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function";
    let detachGesture = () => {};
    if (needsPerm) {
      // iOS 13+: motion needs a user gesture — trigger on the first tap/scroll anywhere
      const ask = async () => { try { const r = await DeviceOrientationEvent.requestPermission(); if (r === "granted") attach(); } catch (e) {} };
      const opts = { once: true, passive: true };
      addEventListener("touchend", ask, opts);
      addEventListener("click", ask, opts);
      detachGesture = () => { removeEventListener("touchend", ask); removeEventListener("click", ask); };
    } else {
      attach(); // Android & desktop: works immediately, no permission needed
    }
    return () => { removeEventListener("mousemove", onMouse); removeEventListener("deviceorientation", onOrient); detachGesture(); };
  }, [mx, my]);
  return <TiltCtx.Provider value={{ sx, sy }}>{children}</TiltCtx.Provider>;
}

const SKY_PUFFS = [

const SKY_BOKEH = Array.from({ length: 16 }).map((_, i) => ({

}));
const SKY_RAYS = [12, 30, 48, 66, 84];

/* Optional rendered backdrops — drop these files in /photos and push.

const BG = { sky: U("bg-sky.png"), hero: U("bg-hero.png"), welcome: U("welcome.png") };
function BgImage({ src, className = "", style }) {
  const [ok, setOk] = useState(true);
  if (!ok) return null;
  return <img src={src} alt="" aria-hidden loading="lazy" onError={() => setOk(false)} className={className} style={style} />;
}

function FairySky() {
  const { sx, sy } = useTilt();
  const { scrollY } = useScroll();
  const farX = useTransform(sx, (v) => v * -16), farY = useTransform(sy, (v) => v * -10);
  const midX = useTransform(sx, (v) => v * -38), midY = useTransform(sy, (v) => v * -24);
  const nearX = useTransform(sx, (v) => v * -66), nearY = useTransform(sy, (v) => v * -42);
  const sFar = useTransform(scrollY, (v) => v * 0.03);
  return (
    <div className="skyfixed" aria-hidden>
      {/* optional rendered sky backdrop (parallax) */}
      <motion.div className="skylayer" style={{ x: farX, y: farY }}>
        <BgImage src={BG.sky} className="absolute inset-0 w-full h-full object-cover" />
      </motion.div>
      {/* god rays (deep) */}
      <motion.div className="skylayer" style={{ x: farX, y: farY }}>
        {SKY_RAYS.map((l, i) => (
          <span key={i} className="godray" style={{
            left: `${l}%`, width: `${64 + i * 16}px`, height: "150%",
            transform: `rotate(${(i - 2) * 8}deg)`, opacity: .5,
            animation: `rayPulse ${7 + i * 1.4}s ease-in-out ${-i}s infinite`,
          }} />
        ))}
      </motion.div>
      {/* far clouds */}
      <motion.div className="skylayer" style={{ x: farX, y: sFar }}>
        {SKY_PUFFS.map((p, i) => (
          <span key={i} className="cloudpuff" style={{
            top: `${p.t}%`, left: `${p.l}%`, width: p.w, height: p.w * 0.42, opacity: p.o,
            animation: `cloudDrift ${40 + i * 7}s ease-in-out ${-i * 5}s infinite`,
          }} />
        ))}
      </motion.div>
      {/* mid bokeh */}
      <motion.div className="skylayer" style={{ x: midX, y: midY }}>
        {SKY_BOKEH.map((b, i) => (
          <span key={i} className="bokeh" style={{
            left: `${b.l}%`, top: `${b.t}%`, width: b.s, height: b.s, opacity: b.o,
            animation: `orbFloat ${b.d}s ease-in-out ${b.delay}s infinite`,
          }} />
        ))}
      </motion.div>
      {/* near sparkles */}
      <motion.div className="skylayer" style={{ x: nearX, y: nearY }}>
        {SKY_BOKEH.slice(0, 7).map((b, i) => (
          <span key={i} className="bokeh" style={{
            left: `${(b.l + 13) % 100}%`, top: `${(b.t + 21) % 100}%`, width: b.s * 0.5, height: b.s * 0.5,
            opacity: .75, animation: `twinkle ${3 + (i % 4)}s ease-in-out ${i * .5}s infinite`,
          }} />
        ))}
      </motion.div>
    </div>
  );
}

/* ---- lush jasmine + mango-leaf florals (reference-style) ---- */
const Blossom = ({ x, y, s = 1, rot = 0 }) => (
  <g transform={`translate(${x} ${y}) rotate(${rot}) scale(${s})`}>
    {[0, 72, 144, 216, 288].map((a) => (
      <ellipse key={a} cx="0" cy="-6.5" rx="4.6" ry="7" fill="#ffffff" transform={`rotate(${a})`} />
    ))}
    <circle r="3.1" fill="#ECC04E" /><circle r="1.4" fill="#C8922F" />
  </g>
);
const Sprig = ({ x, y, s = 1, rot = 0, dark = "#5f9a63", light = "#86bd86" }) => (
  <g transform={`translate(${x} ${y}) rotate(${rot}) scale(${s})`}>
    <path d="M0 0 C-8 -11 -8 -27 0 -36 C8 -27 8 -11 0 0 Z" fill={dark} />
    <path d="M0 -3 C-5 -12 -5 -24 0 -32 C3 -24 3 -13 0 -3 Z" fill={light} opacity=".7" />
    <path d="M0 -2 L0 -33" stroke="#3f7a48" strokeWidth="0.9" opacity=".5" />
  </g>
);
function JasmineCluster({ className = "", flip = false }) {
  return (
    <svg viewBox="0 0 130 96" className={className} aria-hidden
      style={{ filter: "drop-shadow(0 6px 8px rgba(110,90,60,.22))", transform: flip ? "scaleX(-1)" : undefined }}>
      <g style={{ transformOrigin: "65px 90px", animation: "sway 7s ease-in-out infinite" }}>
        <Sprig x={40} y={92} s={1.5} rot={-32} /><Sprig x={66} y={94} s={1.7} rot={4} /><Sprig x={92} y={92} s={1.5} rot={30} />
        <Sprig x={26} y={84} s={1.1} rot={-58} /><Sprig x={108} y={84} s={1.1} rot={58} />
        <Blossom x={36} y={60} s={1.25} rot={10} /><Blossom x={62} y={50} s={1.6} rot={-8} /><Blossom x={90} y={60} s={1.3} rot={16} />
        <Blossom x={50} y={72} s={1.05} rot={-20} /><Blossom x={78} y={74} s={1.1} rot={22} />
        <circle cx="48" cy="44" r="2.6" fill="#fff" /><circle cx="100" cy="48" r="2.4" fill="#fff" />
      </g>
    </svg>
  );
}
function MangoFrond({ className = "", flip = false }) {
  const leaves = [[60,118,18,1],[60,96,-22,1.05],[60,74,20,1.1],[60,52,-20,1],[60,32,8,.9]];
  return (
    <svg viewBox="0 0 120 150" className={className} aria-hidden style={{ transform: flip ? "scaleX(-1)" : undefined }}>
      <g style={{ transformOrigin: "60px 145px", animation: "sway 8s ease-in-out infinite" }}>
        <path d="M60 150 C57 110 57 70 60 26" stroke="#5a8f5e" strokeWidth="3.2" fill="none" strokeLinecap="round" />
        {leaves.map(([x, y, rot, s], i) => (
          <g key={i} transform={`translate(${x} ${y}) rotate(${rot}) scale(${s})`}>
            <path d="M0 0 C-9 -20 -9 -48 0 -66 C9 -48 9 -20 0 0 Z" fill="#5f9a63" />
            <path d="M0 -4 C-5 -20 -5 -44 0 -60 C4 -44 4 -22 0 -4 Z" fill="#84bd85" opacity=".75" />
            <path d="M0 -2 L0 -62" stroke="#3f7a48" strokeWidth="1" opacity=".5" />
          </g>
        ))}
      </g>
    </svg>
  );
}
function Garland({ className = "" }) {
  const P = (t) => [
    (1-t)*(1-t)*8 + 2*(1-t)*t*160 + t*t*312,
    (1-t)*(1-t)*8 + 2*(1-t)*t*64 + t*t*8,
  ];
  const ts = Array.from({ length: 11 }).map((_, i) => i / 10);
  return (
    <svg viewBox="0 0 320 70" className={className} aria-hidden style={{ filter: "drop-shadow(0 4px 6px rgba(110,90,60,.18))" }}>
      <path d="M8 8 Q160 64 312 8" stroke="#6aa06d" strokeWidth="7" fill="none" strokeLinecap="round" />
      <path d="M8 8 Q160 64 312 8" stroke="#8ec48d" strokeWidth="3" fill="none" strokeLinecap="round" opacity=".8" />
      {ts.map((t, i) => { const [x, y] = P(t); return <Sprig key={"s"+i} x={x} y={y+9} s={.7} rot={(i%2?-1:1)*30} />; })}
      {ts.filter((_,i)=>i%2===0).map((t, i) => { const [x, y] = P(t); return <Blossom key={"b"+i} x={x} y={y+5} s={1.05} rot={i*15} />; })}
    </svg>
  );
}

        <Flower2 size={16} className="text-gold"/> Pachala Memories · 50 Frames of Tradition &amp; Love · {STUDIO} <Flower2 size={16} className="text-gold"/>
      </footer>
      {modal!==null && <PhotoModal index={modal} onClose={()=>setModal(null)} onNav={nav} />}
    </div>
    </TiltProvider>
  );
}
createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
</body>
</html>
